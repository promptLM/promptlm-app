# Sidebar nav for the documentation site.
#
# Each `items[].slug` is the basename of an .adoc file under
# docs/pages/<group-dir>/<slug>.adoc, rendered to site/docs/<slug>.html.
#
# Items WITHOUT a slug are placeholders — pages that the design calls
# for but that no one has written yet. They render as non-link greyed
# text in the sidebar. Don't promote an item to a link until the
# matching .adoc lands AND its content reflects real product behavior.
#
# Real user documentation is being authored separately — see issue #205.

groups:
  - heading: GET STARTED
    items:
      - { label: "Introduction" }
      - { label: "Install the CLI" }
      - { label: "Your first run" }
      - { label: "Configuration" }

  - heading: CORE
    items:
      - { label: "Test suites" }
      - { label: "Fixtures" }
      - { label: "Mocking models" }
      - { label: "MCP record & replay" }

  - heading: INTEGRATIONS
    items:
      - { label: "GitHub Actions" }
      - { label: "Vitest / Jest" }
      - { label: "OpenTelemetry" }
      - { label: "OpenAI-compat" }

  - heading: REFERENCE
    items:
      - { label: "CLI" }
      - { label: "Config schema" }
      - { label: "Adapter API" }
