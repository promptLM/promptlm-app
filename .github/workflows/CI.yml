name: promptLM Framework CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REPO_REMOTE_URL: ${{ secrets.REPO_REMOTE_URL }}
      REPO_REMOTE_USERNAME: ${{ secrets.REPO_REMOTE_USERNAME }}
      REPO_REMOTE_TOKEN: ${{ secrets.REPO_REMOTE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Show environment variables
        run: |
          echo "OPENAI_API_KEY=${OPENAI_API_KEY:+set}"
          echo "REPO_REMOTE_URL=${REPO_REMOTE_URL:+set}"
          echo "REPO_REMOTE_USERNAME=${REPO_REMOTE_USERNAME:+set}"
          echo "REPO_REMOTE_TOKEN=${REPO_REMOTE_TOKEN:+set}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check license headers
        uses: apache/skywalking-eyes/header@v0.6.0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build promptLM Framework
        run: mvn -B -DskipTests install

      - name: Run Framework Tests
        run: mvn -B test

      - name: Run Acceptance Tests
        run: mvn -B -f acceptance-tests/pom.xml -Dpromptlm.bootstrap.skip=true test

      - name: Upload Acceptance Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-tests-${{ github.sha }}
          if-no-files-found: warn
          path: |
            acceptance-tests/target/surefire-reports/**
            acceptance-tests/target/screenshots/**
            acceptance-tests/target/traces/**
          retention-days: 1

      - name: Build Repository Template
        run: mvn -B -pl components/repository-template package

      - name: Upload Framework Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: promptlm-framework-${{ github.sha }}
          path: |
            apps/*/target/*.jar
            components/*/target/*.jar
            !components/repository-template/target/*.jar
          retention-days: 1

      - name: Upload Repository Template
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: repository-template-${{ github.sha }}
          path: components/repository-template/target/classes/repo-template.zip
          retention-days: 1
