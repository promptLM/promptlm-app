name: e2e-mock

# Fast (sub-2-min target), hermetic TypeScript Playwright suite that drives
# the SPA against an OpenAPI-generated in-process mock. See epic #248.
#
# This is the every-PR gate. The full-system Java acceptance suite
# (Gitea + Artifactory Testcontainers) continues to run in `acceptance.yml`
# on a slower cadence.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-mock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
