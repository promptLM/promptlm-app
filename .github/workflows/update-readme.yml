name: Update skills table in README

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate skills table
        run: bash scripts/update-skill-table.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "docs: update skills table in README"
            git push
          }
