name: OSS Hygiene Checks

# Read-only OSS hygiene gates: secret scanning + license header presence.
# For the 0.1.0 release these jobs are advisory (continue-on-error) so a
# noisy finding does not block the first public cut. Tighten to required
# checks once the baseline is clean.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    continue-on-error: true
    # We install the gitleaks CLI directly instead of using
    # gitleaks/gitleaks-action@v2 — that wrapper requires a commercial
    # GITLEAKS_LICENSE secret for org repos. The underlying CLI remains
    # MIT-licensed and free.
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --verbose \
            --exit-code 1

  license-headers:
    name: License headers (skywalking-eyes)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check license headers
        uses: apache/skywalking-eyes/header@main
        with:
          config: .licenserc.yaml
          mode: check
