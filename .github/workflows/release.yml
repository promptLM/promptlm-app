name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (major, minor, patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  calculate_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set Next Version
        id: set-version
        run: |
          set -euo pipefail
          current_version="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          base_version="${current_version%-SNAPSHOT}"

          IFS='.' read -r major minor patch <<< "$base_version"
          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "Unsupported project.version format: $current_version" >&2
            exit 1
          fi
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Expected semantic version with optional -SNAPSHOT suffix, got: $current_version" >&2
            exit 1
          fi

          case "${{ github.event.inputs.release_type }}" in
            "major")
              ((major++))
              minor=0
              patch=0
              ;;
            "minor")
              ((minor++))
              patch=0
              ;;
            "patch")
              ((patch++))
              ;;
            *)
              echo "Unsupported release type: ${{ github.event.inputs.release_type }}" >&2
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

  release:
    needs: calculate_version
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Prepare Maven Release
        run: |
          mvn -B release:clean release:prepare \
            -DscmCredentialsId=github \
            -DpushChanges=false \
            -DreleaseVersion=${{ needs.calculate_version.outputs.version }}  \
            -DdevelopmentVersion=${{ needs.calculate_version.outputs.version }}-SNAPSHOT

      - name: Perform Maven Release
        run: mvn release:perform -DlocalCheckout=true

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jars
          path: apps/**/target/*-exec.jar
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  build-native:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
      - name: Build native executables
        run: mvn -Pnative -pl apps/promptlm-cli,apps/promptlm-webapp -am -DskipTests package
      - name: Collect native binaries
        run: |
          mkdir -p target/native
          cp apps/promptlm-cli/target/promptlm-cli target/native/promptlm-cli-macos
          cp apps/promptlm-webapp/target/promptlm-webapp target/native/promptlm-webapp-macos
      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-binaries
          path: target/native/*
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  native-smoke:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
      - name: Build native executables
        run: mvn -B -Pnative -pl apps/promptlm-cli,apps/promptlm-webapp -am -DskipTests package
      - name: Install repository-template for acceptance test classpath
        run: mvn -B -DskipTests -pl components/repository-template -am install
      - name: Run native smoke acceptance tests
        run: |
          mvn -B -f acceptance-tests/pom.xml \
            -Dpromptlm.test.groups=native-smoke \
            -Dpromptlm.test.excludedGroups= \
            -Dpromptlm.test.cli.native.path=../apps/promptlm-cli/target/promptlm-cli \
            -Dpromptlm.test.webapp.native.path=../apps/promptlm-webapp/target/promptlm-webapp \
            test
      - name: Upload Native Smoke Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-native-smoke-${{ github.sha }}
          if-no-files-found: warn
          path: |
            acceptance-tests/target/surefire-reports/**
            acceptance-tests/target/screenshots/**
            acceptance-tests/target/traces/**
          retention-days: 1

  create-github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    needs: [calculate_version, release, build-native, native-smoke]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prep dir
        run: |
          mkdir -p target/jars
          mkdir -p target/native

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jars
          merge-multiple: true
          path: target/jars

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-binaries
          path: target/native

      - name: "Debug: List Release Artifacts"
        run: |
          ls -R target/jars
          ls -R target/native

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n<details>\n<summary>Uncategorized</summary>\n\n#{{UNCATEGORIZED}}\n</details>",
              "pr_templatze": "#{{TITLE}} (#{{ASSIGNEES[*]}})",
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["enhancement"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["bug"]
                },
                {
                  "title": "## 💬 Other",
                  "labels": ["other"]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: mikepenz/action-gh-release@v1
        with:
          tag_name: v${{ needs.calculate_version.outputs.version }}
          files: |
            target/jars/**/*.jar
            target/native/*
          body: ${{steps.changelog.outputs.changelog}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
