name: Release

# Thin caller of the org-wide reusable workflow at
# promptLM/.github/.github/workflows/release-java-ghpackages.yml.
#
# The reusable owns the full pipeline (validate → verify → native matrix →
# native-smoke → deploy to GH Packages → create GH Release with binaries).
# This file only:
#   1. computes the next version from the release_type (major/minor/patch)
#   2. delegates to the reusable with that version
#
# When the repo moves to release-please, replace the calculate_version job
# with a release-please job that emits the version on tag creation, and the
# call below stays identical.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (major, minor, patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      dry-run:
        description: 'Run the pipeline without deploying or creating the release'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  calculate_version:
    name: compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Bump version
        id: set-version
        run: |
          set -euo pipefail
          current_version="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          base_version="${current_version%-SNAPSHOT}"
          IFS='.' read -r major minor patch <<< "$base_version"
          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "Unsupported project.version: $current_version" >&2; exit 1
          fi
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Expected semantic version with optional -SNAPSHOT, got: $current_version" >&2; exit 1
          fi
          case "${{ inputs.release_type }}" in
            major) ((major++)); minor=0; patch=0 ;;
            minor) ((minor++)); patch=0 ;;
            patch) ((patch++)) ;;
            *) echo "Unsupported release_type: ${{ inputs.release_type }}" >&2; exit 1 ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

  publish:
    name: publish v${{ needs.calculate_version.outputs.version }}
    needs: calculate_version
    uses: promptLM/.github/.github/workflows/release-java-ghpackages.yml@main
    with:
      version: ${{ needs.calculate_version.outputs.version }}
      dry-run: ${{ inputs.dry-run }}
      maven-package-name: dev.promptlm.promptlm-parent
      cli-binary: promptlm-cli
    secrets: inherit
