name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (major, minor, patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  calculate_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set Next Version
        id: set-version
        run: |
          set -euo pipefail
          current_version="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          base_version="${current_version%-SNAPSHOT}"

          IFS='.' read -r major minor patch <<< "$base_version"
          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "Unsupported project.version format: $current_version" >&2
            exit 1
          fi
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "Expected semantic version with optional -SNAPSHOT suffix, got: $current_version" >&2
            exit 1
          fi

          case "${{ github.event.inputs.release_type }}" in
            "major")
              ((major++))
              minor=0
              patch=0
              ;;
            "minor")
              ((minor++))
              patch=0
              ;;
            "patch")
              ((patch++))
              ;;
            *)
              echo "Unsupported release type: ${{ github.event.inputs.release_type }}" >&2
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

  jvm-verify:
    needs: calculate_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run JVM build and tests
        run: mvn -B verify

  jvm-acceptance:
    needs: jvm-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install artifacts required by acceptance-tests
        run: mvn -B -DskipTests -pl apps/promptlm-cli,apps/promptlm-webapp,components/repository-template -am install
      - name: Run acceptance tests
        run: mvn -B -f acceptance-tests/pom.xml -Dpromptlm.bootstrap.skip=true test
      - name: Upload Acceptance Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-acceptance-tests-${{ github.sha }}
          if-no-files-found: warn
          path: |
            acceptance-tests/target/surefire-reports/**
            acceptance-tests/target/screenshots/**
            acceptance-tests/target/traces/**
          retention-days: 1

  release:
    needs: [calculate_version, jvm-verify, jvm-acceptance, build-native-matrix, native-smoke]
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Check if release version is already published
        id: release-version-check
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.calculate_version.outputs.version }}"
          package_name="dev.promptlm.promptlm-parent"
          versions_file="$(mktemp)"
          error_file="$(mktemp)"

          set +e
          gh api "/orgs/promptlm/packages/maven/${package_name}/versions?per_page=100" --paginate --jq '.[].name' >"$versions_file" 2>"$error_file"
          api_exit=$?
          set -e

          if [[ $api_exit -eq 0 ]]; then
            if grep -Fxq "$version" "$versions_file"; then
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              echo "Release version ${version} already exists in GitHub Packages. Skipping deploy and rebuilding release jars only."
            else
              echo "already_published=false" >> "$GITHUB_OUTPUT"
              echo "Release version ${version} not found in GitHub Packages. Running full Maven release deploy."
            fi
          elif grep -Eq "404|Package not found" "$error_file"; then
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Maven package ${package_name} not found yet. Treating release version ${version} as not published."
          else
            cat "$error_file" >&2
            exit "$api_exit"
          fi

      - name: Prepare Maven Release
        if: steps.release-version-check.outputs.already_published != 'true'
        run: |
          mvn -B release:clean release:prepare \
            -DscmCredentialsId=github \
            -DpushChanges=false \
            -DreleaseVersion=${{ needs.calculate_version.outputs.version }}  \
            -DdevelopmentVersion=${{ needs.calculate_version.outputs.version }}-SNAPSHOT

      - name: Perform Maven Release
        if: steps.release-version-check.outputs.already_published != 'true'
        run: mvn -B release:perform -DlocalCheckout=true -Darguments="-DdeployAtEnd=true"

      - name: Rebuild app jars for already-published release version
        if: steps.release-version-check.outputs.already_published == 'true'
        run: |
          mvn -B versions:set -DnewVersion=${{ needs.calculate_version.outputs.version }} -DgenerateBackupPoms=false
          mvn -B -pl apps/promptlm-cli,apps/promptlm-webapp -am -DskipTests package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jars
          path: |
            apps/**/target/*.jar
            !apps/**/target/*.jar.original
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  build-native-matrix:
    needs: jvm-acceptance
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.2'
          distribution: 'graalvm-community'
          components: 'native-image'
      - name: Build native executables
        run: mvn -B -Pnative -pl apps/promptlm-cli,apps/promptlm-webapp -am -DskipTests package
      - name: Package native archives for Unix-like runners
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          arch="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          work_dir="target/native/${{ matrix.platform }}-${arch}"
          cli_binary="apps/promptlm-cli/target/promptlm-cli"
          webapp_binary="apps/promptlm-webapp/target/promptlm-webapp"

          [[ -x "$cli_binary" ]] || { echo "Missing or non-executable native binary: $cli_binary" >&2; exit 1; }
          [[ -x "$webapp_binary" ]] || { echo "Missing or non-executable native binary: $webapp_binary" >&2; exit 1; }

          mkdir -p "$work_dir/promptlm-cli" "$work_dir/promptlm-webapp"
          cp "$cli_binary" "$work_dir/promptlm-cli/promptlm-cli"
          cp "$webapp_binary" "$work_dir/promptlm-webapp/promptlm-webapp"

          mkdir -p target/native
          tar -C "$work_dir" -czf "target/native/promptlm-cli-${{ matrix.platform }}-${arch}.tar.gz" promptlm-cli
          tar -C "$work_dir" -czf "target/native/promptlm-webapp-${{ matrix.platform }}-${arch}.tar.gz" promptlm-webapp
      - name: Package native archives for Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $arch = $env:RUNNER_ARCH.ToLowerInvariant()
          $workDir = "target/native/windows-$arch"
          $cliBinary = "apps/promptlm-cli/target/promptlm-cli.exe"
          $webappBinary = "apps/promptlm-webapp/target/promptlm-webapp.exe"

          if (-not (Test-Path $cliBinary)) { throw "Missing native binary: $cliBinary" }
          if (-not (Test-Path $webappBinary)) { throw "Missing native binary: $webappBinary" }

          New-Item -ItemType Directory -Path "$workDir/promptlm-cli" -Force | Out-Null
          New-Item -ItemType Directory -Path "$workDir/promptlm-webapp" -Force | Out-Null

          Copy-Item $cliBinary "$workDir/promptlm-cli/promptlm-cli.exe"
          Copy-Item $webappBinary "$workDir/promptlm-webapp/promptlm-webapp.exe"

          Compress-Archive -Path "$workDir/promptlm-cli/*" -DestinationPath "target/native/promptlm-cli-windows-$arch.zip" -Force
          Compress-Archive -Path "$workDir/promptlm-webapp/*" -DestinationPath "target/native/promptlm-webapp-windows-$arch.zip" -Force
      - name: Upload Native Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: |
            target/native/promptlm-cli-${{ matrix.platform }}-*
            target/native/promptlm-webapp-${{ matrix.platform }}-*
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  native-smoke:
    needs: jvm-acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.0.2'
          distribution: 'graalvm-community'
          components: 'native-image'
      - name: Build native executables
        run: mvn -B -Pnative -pl apps/promptlm-cli,apps/promptlm-webapp -am -DskipTests package
      - name: Install artifacts required by acceptance-tests
        run: mvn -B -DskipTests -pl apps/promptlm-cli,apps/promptlm-webapp,components/repository-template -am install
      - name: Run native smoke acceptance tests
        run: |
          mvn -B -f acceptance-tests/pom.xml \
            -Dpromptlm.test.groups=native-smoke \
            -Dpromptlm.test.excludedGroups= \
            -Dpromptlm.test.cli.native.path=../apps/promptlm-cli/target/promptlm-cli \
            -Dpromptlm.test.webapp.native.path=../apps/promptlm-webapp/target/promptlm-webapp \
            test
      - name: Upload Native Smoke Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-native-smoke-${{ github.sha }}
          if-no-files-found: warn
          path: |
            acceptance-tests/target/surefire-reports/**
            acceptance-tests/target/screenshots/**
            acceptance-tests/target/traces/**
          retention-days: 1

  create-github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    needs: [calculate_version, release, build-native-matrix, native-smoke]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prep dir
        run: |
          mkdir -p target/jars
          mkdir -p target/native

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jars
          merge-multiple: true
          path: target/jars

      - name: Download Native Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: target/native

      - name: "Debug: List Release Artifacts"
        run: |
          ls -R target/jars
          ls -R target/native

      - name: Verify required native assets and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          check_single_asset() {
            local pattern="$1"
            local label="$2"
            local matches=($pattern)
            if [[ ${#matches[@]} -ne 1 ]]; then
              echo "Expected exactly one ${label} asset matching '${pattern}', found ${#matches[@]}." >&2
              echo "Matches: ${matches[*]:-<none>}" >&2
              exit 1
            fi
          }

          check_single_asset "target/native/promptlm-cli-linux-*.tar.gz" "Linux CLI"
          check_single_asset "target/native/promptlm-webapp-linux-*.tar.gz" "Linux webapp"
          check_single_asset "target/native/promptlm-cli-macos-*.tar.gz" "macOS CLI"
          check_single_asset "target/native/promptlm-webapp-macos-*.tar.gz" "macOS webapp"
          check_single_asset "target/native/promptlm-cli-windows-*.zip" "Windows CLI"
          check_single_asset "target/native/promptlm-webapp-windows-*.zip" "Windows webapp"

          (
            cd target/native
            sha256sum promptlm-* > SHA256SUMS
          )
          cat target/native/SHA256SUMS

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n<details>\n<summary>Uncategorized</summary>\n\n#{{UNCATEGORIZED}}\n</details>",
              "pr_templatze": "#{{TITLE}} (#{{ASSIGNEES[*]}})",
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["enhancement"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["bug"]
                },
                {
                  "title": "## 💬 Other",
                  "labels": ["other"]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: mikepenz/action-gh-release@v1
        with:
          tag_name: v${{ needs.calculate_version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          files: |
            target/jars/**/*.jar
            target/native/*
          body: ${{steps.changelog.outputs.changelog}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
