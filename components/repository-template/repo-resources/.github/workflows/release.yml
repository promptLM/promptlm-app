name: Release Prompts

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3) — required when running manually'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/validate-prompts.sh scripts/package-prompts.sh

      - name: Validate prompts
        run: scripts/validate-prompts.sh

      - name: Determine release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${INPUT_VERSION}" ]]; then
              echo "::error::workflow_dispatch requires the 'version' input (e.g., 1.2.3)"
              exit 1
            fi
            version="${INPUT_VERSION#v}"
          else
            # Tag push: refs/tags/vX.Y.Z → vX.Y.Z is in REF_NAME → strip leading 'v'.
            version="${REF_NAME#v}"
          fi
          if [[ ! "${version}" =~ ^[A-Za-z0-9._+-]+$ ]]; then
            echo "::error::invalid version '${version}'"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "resolved version: ${version}"

      - name: Package prompts
        run: scripts/package-prompts.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "release ${TAG} already exists; reusing it"
          else
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi

      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" dist/*.zip --clobber
          gh release upload "${TAG}" dist/checksums.sha256 --clobber
