name: Build Prompt Artifacts

on:
  workflow_dispatch: {}

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Java artifacts
        run: ./tools/release/build-artifacts --target java

      - name: Upload Java artifacts
        if: ${{ hashFiles('dist/java/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prompt-artifacts-java
          path: dist/java/

  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build

      - name: Build Python artifacts
        run: ./tools/release/build-artifacts --target python

      - name: Upload Python artifacts
        if: ${{ hashFiles('dist/python/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prompt-artifacts-python
          path: dist/python/

  build-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build JS artifacts
        run: ./tools/release/build-artifacts --target js

      - name: Upload JS artifacts
        if: ${{ hashFiles('dist/js/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: prompt-artifacts-js
          path: dist/js/
