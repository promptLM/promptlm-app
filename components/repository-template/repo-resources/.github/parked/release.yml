name: Release Prompt Repository

on:
  push:
    tags:
      - '*-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    uses: ./.github/workflows/build-prompts-reusable.yml
    with:
      fetch-depth: 0
      set-version: true
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/v') && github.ref_name != '' && github.ref_name) || github.sha }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REPO_REMOTE_URL: ${{ secrets.REPO_REMOTE_URL }}
      REPO_REMOTE_USERNAME: ${{ secrets.REPO_REMOTE_USERNAME }}
      REPO_REMOTE_TOKEN: ${{ secrets.REPO_REMOTE_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release metadata
        run: |
          echo "VERSION=${{ needs.build.outputs.version }}" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download prompts artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.jar-artifact }}
          path: dist

      - name: Download test support zip
        if: ${{ needs.build.outputs.test-support-zip != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.test-support-artifact }}-zip
          path: dist

      - name: Create release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false

      - name: Upload prompts jar to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/${{ needs.build.outputs.jar-path }}
          asset_name: prompts-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive

      - name: Upload test support zip to release
        if: ${{ needs.build.outputs.test-support-zip != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/${{ needs.build.outputs.test-support-zip }}
          asset_name: test-support-${{ env.VERSION }}.zip
          asset_content_type: application/zip

      - name: Deploy to Maven repository (if configured)
        if: env.REPO_REMOTE_URL != ''
        run: |
          mvn -B -ntp versions:set -DnewVersion=${{ env.VERSION }} -DgenerateBackupPoms=false
          mvn -B -ntp deploy -DskipTests
